# apf Release Workflow — generated by pkg_gen.sh from pkg_lib templates
#
# Builds RPM (el7, el8/el9/el10) and DEB (Debian 12) packages on tag push,
# then uploads them as GitHub Release assets.
#
# Placeholders:
#   apf  — package name
#
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-rpm-el7:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build RPM (CentOS 7)
        run: |
          docker build -t apf-rpm-el7 -f pkg/docker/Dockerfile.rpm-el7 .
          mkdir -p output
          docker run --rm -v "$PWD/output:/output" apf-rpm-el7

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-el7
          path: output/*.rpm

  build-rpm-el9:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build RPMs (Rocky 9 — el8/el9/el10)
        run: |
          docker build -t apf-rpm-el9 -f pkg/docker/Dockerfile.rpm-el9 .
          mkdir -p output
          docker run --rm -v "$PWD/output:/output" apf-rpm-el9

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-el9
          path: output/*.rpm

  build-deb:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DEB (Debian 12)
        run: |
          docker build -t apf-deb -f pkg/docker/Dockerfile.deb .
          mkdir -p output
          docker run --rm -v "$PWD/output:/output" apf-deb

      - name: Upload DEB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: output/*.deb

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [build-rpm-el7, build-rpm-el9, build-deb]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            packages/*
