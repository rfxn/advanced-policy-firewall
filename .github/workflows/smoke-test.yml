name: APF Smoke Tests

on:
  push:
    branches: [master, '2.*']
  pull_request:
    branches: [master]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        os: [debian12, centos7, rocky8, rocky9, ubuntu2004, ubuntu2204, ubuntu2404]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke tests (${{ matrix.os }})
        run: ./tests/run-tests.sh --os ${{ matrix.os }}
