PATH=/sbin:/usr/sbin:/usr/bin:/usr/local/bin:/usr/local/sbin:$PATH ; export PATH
VER="2.0.2"
APPN="apf"

ifconfig=$(command -v ifconfig 2>/dev/null)
ip=$(command -v ip 2>/dev/null)
HOST=$(command -v host 2>/dev/null)
IPT=$(command -v iptables 2>/dev/null)
IP6T=$(command -v ip6tables 2>/dev/null)
MPB=$(command -v modprobe 2>/dev/null)
LSM=$(command -v lsmod 2>/dev/null)
RMM=$(command -v rmmod 2>/dev/null)
IPTS=$(command -v iptables-save 2>/dev/null)
IPTR=$(command -v iptables-restore 2>/dev/null)
IP6TS=$(command -v ip6tables-save 2>/dev/null)
IP6TR=$(command -v ip6tables-restore 2>/dev/null)
DIFF=$(command -v diff 2>/dev/null)
WGET=$(command -v wget 2>/dev/null)
MD5=$(command -v md5sum 2>/dev/null)
UNAME=$(command -v uname 2>/dev/null)
IPSET=$(command -v ipset 2>/dev/null)
CURL=$(command -v curl 2>/dev/null)
GETENT=$(command -v getent 2>/dev/null)
TIMEOUT=$(command -v timeout 2>/dev/null)

## Force MONOKERN option on Virtuozzo/OpenVZ based VPS
if [ -d /proc/vz ] && [ ! -d /proc/bc ]; then
        SET_MONOKERN="1"
fi

## LEGACY VARIABLE DEFINITIONS
if [ -z "$IFACE_UNTRUSTED" ] && [ "$IFACE_IN" ]; then
	IFACE_UNTRUSTED="$IFACE_IN"
fi
IF="$IFACE_UNTRUSTED"

if [ -z "$ALL_STOP" ]; then
	ALL_STOP="DROP"
fi

if [ -n "$ip" ]; then
	IP6_NET=$($ip addr list "$IFACE_UNTRUSTED" | grep -w inet6 | grep -v fe80 | head -n1 | awk '{print$2}')
	NET=$($ip addr list "$IFACE_UNTRUSTED" | tr '/' ' ' |  grep -w inet | head -n1 | awk '{print$2}')
else
	IP6_NET=""
	NET=""
fi
NAME=$(echo "$APPN" | tr '[:lower:]' '[:upper:]')
TIME=$(date +"%D %H:%M:%S")
UTIME=$(date +"%s")
KREL=$($UNAME -r | cut -d\. -f 1,2)

LOCK_TIMEOUT="300"
ENTER_LOCK_TIMEOUT="60"
LOCK_FILE="$INSTALL_PATH/lock.utime"

IPT_FLAGS=""
if [[ "$IPT_LOCK_SUPPORT" == "auto" ]]; then
  if [ -n "$IPT" ] && $IPT --help 2>&1 | grep -q '\-w'; then
    IPT_FLAGS="-w $IPT_LOCK_TIMEOUT"
  fi
elif [[ "$IPT_LOCK_SUPPORT" == "1" ]]; then
  IPT_FLAGS="-w $IPT_LOCK_TIMEOUT"
fi

# Auto-detect container runtime for DOCKER_COMPAT
if [[ "$DOCKER_COMPAT" == "auto" ]]; then
  if [ -n "$IPT" ] && $IPT $IPT_FLAGS -L DOCKER-USER -n > /dev/null 2>&1; then
    DOCKER_COMPAT="1"
  else
    DOCKER_COMPAT="0"
  fi
fi

ALLOW_HOSTS="$INSTALL_PATH/allow_hosts.rules"
DENY_HOSTS="$INSTALL_PATH/deny_hosts.rules"
GALLOW_HOSTS="$INSTALL_PATH/glob_allow.rules"
GDENY_HOSTS="$INSTALL_PATH/glob_deny.rules"
DS_HOSTS="$INSTALL_PATH/ds_hosts.rules"
PHP_HOSTS="$INSTALL_PATH/php_hosts.rules"
DROP_HOSTS="$INSTALL_PATH/sdrop_hosts.rules"
ECNSHAME_HOSTS="$INSTALL_PATH/ecnshame_hosts.rules"
RABP="$INSTALL_PATH/internals/rab.ports"
MD5_FILES="$INSTALL_PATH/*.rules $INSTALL_PATH/internals/*.networks $INSTALL_PATH/vnet/*.rules $RABP"
MCATNET="$INSTALL_PATH/internals/multicast.networks"
PRVNET="$INSTALL_PATH/internals/private.networks"
RESNET="$INSTALL_PATH/internals/reserved.networks"
PRERT="$INSTALL_PATH/preroute.rules"
POSTRT="$INSTALL_PATH/postroute.rules"
if [ "$LOG_EXT" == "1" ]; then
        LEXT="--log-tcp-options --log-ip-options"
else
        LEXT=""
fi
if [ -z "$SET_EXPIRE" ]; then
        SET_EXPIRE=0
fi

# NDP ICMPv6 types that must always be permitted for IPv6 connectivity
NDP_TYPES="133 134 135 136"

. "$RABP"
CNF_FUNC="$INSTALL_PATH/internals/functions.apf"
. "$CNF_FUNC"
. "$INSTALL_PATH/internals/gretunnel.sh"
# Source shared structured event logging library
# shellcheck disable=SC1091
. "$INSTALL_PATH/internals/elog_lib.sh"
# Set elog_lib defaults — both files/apf and files/firewall source this file
# shellcheck disable=SC2034
ELOG_APP="${ELOG_APP:-$APPN}"
# shellcheck disable=SC2034
ELOG_LOG_FILE="${ELOG_LOG_FILE:-$LOG_APF}"
# shellcheck disable=SC2034
ELOG_FORMAT="${ELOG_FORMAT:-classic}"
# shellcheck disable=SC2034
ELOG_LEVEL="${ELOG_LEVEL:-1}"
# shellcheck disable=SC2034
ELOG_STDOUT_PREFIX="${ELOG_STDOUT_PREFIX:-short}"
# Audit trail paths — shared by files/apf and files/firewall (subprocess)
# shellcheck disable=SC2034
ELOG_LOG_DIR="${ELOG_LOG_DIR:-/var/log/apf}"
# shellcheck disable=SC2034
ELOG_AUDIT_FILE="${ELOG_AUDIT_FILE:-${ELOG_LOG_DIR}/audit.log}"
# Map SET_VERBOSE to ELOG_STDOUT: verbose=always, normal=flag (force-stdout via eout arg2)
if [ -z "${ELOG_STDOUT:-}" ]; then
	if [ "$SET_VERBOSE" = "1" ]; then
		# shellcheck disable=SC2034
		ELOG_STDOUT="always"
	else
		# shellcheck disable=SC2034
		ELOG_STDOUT="flag"
	fi
fi
