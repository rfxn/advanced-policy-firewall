<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 160" width="830" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#07080a"/>
    </linearGradient>
    <linearGradient id="wall-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0"/>
      <stop offset="40%" stop-color="#4ade80" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#4ade80" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#4ade80" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="830" height="160" fill="url(#bg)" rx="8"/>

  <!-- Top bar: lock icon + tagline -->
  <g transform="translate(40, 18)">
    <rect x="8" y="16" width="20" height="16" rx="3" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.8"/>
    <path d="M12 16 L12 10 C12 4 24 4 24 10 L24 16" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.7"/>
    <circle cx="18" cy="24" r="2" fill="#4ade80" opacity="0.9"/>
    <text x="44" y="28" fill="#8b949e" font-family="ui-monospace,'Cascadia Code','Source Code Pro',Consolas,monospace" font-size="13">Policy-driven access control for Linux</text>
  </g>

  <!-- Policy rule tickers (top right) -->
  <g font-family="ui-monospace,monospace" font-size="9" opacity="0.25">
    <text x="590" y="22" fill="#4ade80">&#x2713; ALLOW 10.0.0.0/8</text>
    <text x="610" y="36" fill="#f85149">&#x2717; DENY 203.0.113.0/24</text>
    <text x="630" y="50" fill="#4ade80">&#x2713; ALLOW tcp:in:d=443</text>
  </g>

  <!-- Divider -->
  <line x1="40" y1="58" x2="790" y2="58" stroke="#8b949e" stroke-width="0.5" opacity="0.15"/>

  <!-- Firewall chain flow visualization -->

  <!-- Vertical barrier walls with glow -->
  <rect x="215" y="64" width="50" height="92" fill="url(#wall-glow)"/>
  <line x1="240" y1="66" x2="240" y2="154" stroke="#4ade80" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,3"/>

  <rect x="405" y="64" width="50" height="92" fill="url(#wall-glow)"/>
  <line x1="430" y1="66" x2="430" y2="154" stroke="#4ade80" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,3"/>

  <rect x="595" y="64" width="50" height="92" fill="url(#wall-glow)"/>
  <line x1="620" y1="66" x2="620" y2="154" stroke="#4ade80" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,3"/>

  <!-- Wall labels -->
  <text x="240" y="74" fill="#4ade80" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle" opacity="0.4" font-weight="600">INPUT</text>
  <text x="430" y="74" fill="#4ade80" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle" opacity="0.4" font-weight="600">TRUST</text>
  <text x="620" y="74" fill="#4ade80" font-family="ui-monospace,monospace" font-size="8" text-anchor="middle" opacity="0.4" font-weight="600">POLICY</text>

  <!-- Stream 1 (y=86): passes all three walls -->
  <line x1="50" y1="86" x2="780" y2="86" stroke="#4ade80" stroke-width="1.3" opacity="0.4" filter="url(#glow)"/>
  <circle cx="240" cy="86" r="2.5" fill="#4ade80" opacity="0.6"/>
  <circle cx="430" cy="86" r="2.5" fill="#4ade80" opacity="0.6"/>
  <circle cx="620" cy="86" r="2.5" fill="#4ade80" opacity="0.6"/>
  <polygon points="784,86 777,83 777,89" fill="#4ade80" opacity="0.5"/>

  <!-- Stream 2 (y=102): blocked at INPUT -->
  <line x1="50" y1="102" x2="232" y2="102" stroke="#4ade80" stroke-width="1.3" opacity="0.25"/>
  <circle cx="240" cy="102" r="4" fill="#f85149" fill-opacity="0.15" stroke="#f85149" stroke-width="1" opacity="0.8"/>
  <line x1="237" y1="99" x2="243" y2="105" stroke="#f85149" stroke-width="1.3" opacity="0.8"/>
  <line x1="243" y1="99" x2="237" y2="105" stroke="#f85149" stroke-width="1.3" opacity="0.8"/>

  <!-- Stream 3 (y=118): passes INPUT, blocked at TRUST -->
  <line x1="50" y1="118" x2="422" y2="118" stroke="#4ade80" stroke-width="1.3" opacity="0.25"/>
  <circle cx="240" cy="118" r="2.5" fill="#4ade80" opacity="0.5"/>
  <circle cx="430" cy="118" r="4" fill="#f85149" fill-opacity="0.15" stroke="#f85149" stroke-width="1" opacity="0.8"/>
  <line x1="427" y1="115" x2="433" y2="121" stroke="#f85149" stroke-width="1.3" opacity="0.8"/>
  <line x1="433" y1="115" x2="427" y2="121" stroke="#f85149" stroke-width="1.3" opacity="0.8"/>

  <!-- Stream 4 (y=134): passes all three walls -->
  <line x1="50" y1="134" x2="780" y2="134" stroke="#4ade80" stroke-width="1.3" opacity="0.4" filter="url(#glow)"/>
  <circle cx="240" cy="134" r="2.5" fill="#4ade80" opacity="0.6"/>
  <circle cx="430" cy="134" r="2.5" fill="#4ade80" opacity="0.6"/>
  <circle cx="620" cy="134" r="2.5" fill="#4ade80" opacity="0.6"/>
  <polygon points="784,134 777,131 777,137" fill="#4ade80" opacity="0.5"/>

  <!-- Stream 5 (y=150): passes INPUT+TRUST, blocked at POLICY -->
  <line x1="50" y1="150" x2="612" y2="150" stroke="#4ade80" stroke-width="1.3" opacity="0.25"/>
  <circle cx="240" cy="150" r="2.5" fill="#4ade80" opacity="0.5"/>
  <circle cx="430" cy="150" r="2.5" fill="#4ade80" opacity="0.5"/>
  <circle cx="620" cy="150" r="4" fill="#f85149" fill-opacity="0.15" stroke="#f85149" stroke-width="1" opacity="0.8"/>
  <line x1="617" y1="147" x2="623" y2="153" stroke="#f85149" stroke-width="1.3" opacity="0.8"/>
  <line x1="623" y1="147" x2="617" y2="153" stroke="#f85149" stroke-width="1.3" opacity="0.8"/>
</svg>
